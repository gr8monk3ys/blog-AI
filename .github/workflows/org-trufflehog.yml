name: org-trufflehog

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: PR cost guard
        if: github.event_name == 'pull_request'
        run: echo "Skipping full TruffleHog scan on pull requests; default-branch and manual runs still execute it."

      - name: Checkout
        if: github.event_name != 'pull_request'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@041f07e9df901a1038a528e5525b0226d04dd5ea
        with:
          extra_args: --results=verified
