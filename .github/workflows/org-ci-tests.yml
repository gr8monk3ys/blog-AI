name: org-ci-tests

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  ci-tests-minimum:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        if: ${{ hashFiles('pyproject.toml', 'requirements*.txt', 'setup.py', 'tests/**/*.py', 'pytest.ini', 'tox.ini') != '' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Setup Bun
        if: ${{ hashFiles('package.json') != '' }}
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461
        with:
          bun-version: '1.3.10'

      - name: Setup Go
        if: ${{ hashFiles('go.mod') != '' }}
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: '1.22'

      - name: Run Minimum CI Tests
        shell: bash
        run: |
          set -euo pipefail
          failures=0
          ran=0

          # JavaScript / Bun
          if [ -f package.json ]; then
            ran=1
            if [ ! -d node_modules ]; then
              echo "Skipping Bun tests (node_modules absent; dependency install is disabled in this workflow)."
            elif bun -e 'const fs=require("fs");const p=JSON.parse(fs.readFileSync("package.json","utf8"));const t=(p.scripts&&p.scripts.test)||"";const bad=["", "echo \"Error: no test specified\" && exit 1", "exit 1"];process.exit(bad.includes(t)?1:0)' ; then
              bun run test || failures=$((failures+1))
            else
              echo "No actionable Bun test script; skipping JavaScript tests."
            fi
          fi

          # Python
          py_tests=0
          [ -d tests ] && py_tests=1
          [ -f pytest.ini ] && py_tests=1
          [ -f tox.ini ] && py_tests=1
          if [ -f pyproject.toml ] && grep -qi pytest pyproject.toml; then py_tests=1; fi
          if [ -f setup.cfg ] && grep -qi pytest setup.cfg; then py_tests=1; fi

          if [ "$py_tests" -eq 1 ]; then
            ran=1
            if python -c 'import importlib.util,sys; sys.exit(0 if importlib.util.find_spec("pytest") else 1)'; then
              pytest -q || failures=$((failures+1))
            else
              echo "Skipping pytest (pytest not available; dependency install is disabled in this workflow)."
            fi
          fi

          # Go
          if [ -f go.mod ]; then
            ran=1
            go test ./... || failures=$((failures+1))
          fi

          # Rust
          if [ -f Cargo.toml ] && command -v cargo >/dev/null 2>&1; then
            ran=1
            cargo test --workspace --all-targets || failures=$((failures+1))
          fi

          if [ "$ran" -eq 0 ]; then
            echo "No recognized test entrypoint discovered."
          fi

          if [ "$failures" -gt 0 ]; then
            echo "$failures test command(s) failed."
            exit 1
          fi
