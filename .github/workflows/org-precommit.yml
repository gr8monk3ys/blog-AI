name: org-precommit

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Check merge conflicts
        run: python -m pre_commit run check-merge-conflict --all-files

      - name: Check JSON
        run: python -m pre_commit run check-json --all-files

      - name: Check YAML
        run: python -m pre_commit run check-yaml --all-files

      - name: Check added large files
        run: python -m pre_commit run check-added-large-files --all-files
