name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  PYTHON_VERSION: "3.12"
  BUN_VERSION: "1.3.10"
  GITLEAKS_VERSION: "8.30.0"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  backend-tests:
    name: Backend Tests (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run smoke suite (blocking)
        run: |
          pytest tests/test_feature_smoke.py tests/test_routes_health.py -q
        env:
          DEV_MODE: "true"
          OPENAI_API_KEY: "test"

      - name: Enforce critical-route integration coverage >= 85%
        run: |
          pytest \
            tests/test_routes_blog.py \
            tests/test_routes_book.py \
            tests/test_routes_webhooks.py \
            tests/test_routes_payments.py \
            tests/test_routes_usage.py \
            --cov=app.routes.blog \
            --cov=app.routes.book \
            --cov=app.routes.webhooks \
            --cov=app.routes.payments \
            --cov=app.routes.usage \
            --cov-fail-under=85 \
            --cov-report=xml \
            --cov-report=term-missing \
            -q
        env:
          DEV_MODE: "true"
          DEV_API_KEY: "test-key"
          ENVIRONMENT: "development"
          SENTRY_ENVIRONMENT: "development"
          RATE_LIMIT_ENABLED: "false"
          OPENAI_API_KEY: "test"

      - name: Upload coverage report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: always()
        with:
          name: backend-coverage
          path: apps/api/coverage.xml
          retention-days: 14

  backend-regression:
    name: Backend Regression (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run full backend tests
        run: pytest -q
        env:
          DEV_MODE: "true"
          OPENAI_API_KEY: "test"

  frontend-checks:
    name: Frontend Checks (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Unit tests
        run: bun run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: always()
        with:
          name: frontend-coverage
          path: apps/web/coverage/
          retention-days: 14

      - name: Build
        run: bun run build

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-checks]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests with coverage gate
        run: bun run test:e2e:coverage

      - name: Upload E2E coverage report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: always()
        with:
          name: frontend-e2e-coverage
          path: apps/web/coverage/e2e/
          retention-days: 14

      - name: Upload Playwright report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build (main only)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build production image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile.prod
          push: false
          tags: blog-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" \
            --output "${RUNNER_TEMP}/${archive}"
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}" gitleaks
          chmod +x "${RUNNER_TEMP}/gitleaks"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Determine gitleaks range
        id: gitleaks-range
        shell: bash
        run: |
          set -euo pipefail
          event_name="${GITHUB_EVENT_NAME}"
          range_mode="head"
          log_opts="-1"

          if [ "${event_name}" = "push" ]; then
            base_ref="$(python3 -c 'import json, os; print(json.load(open(os.environ["GITHUB_EVENT_PATH"]))["before"])')"
            head_ref="$(python3 -c 'import json, os; print(json.load(open(os.environ["GITHUB_EVENT_PATH"]))["after"])')"
            if [ "${base_ref}" != "${head_ref}" ] && [ "${base_ref}" != "0000000000000000000000000000000000000000" ]; then
              range_mode="range"
              log_opts="--no-merges --first-parent ${base_ref}^..${head_ref}"
            fi
          elif [ "${event_name}" = "pull_request" ]; then
            base_ref="$(python3 -c 'import json, os; print(json.load(open(os.environ["GITHUB_EVENT_PATH"]))["pull_request"]["base"]["sha"])')"
            head_ref="$(python3 -c 'import json, os; print(json.load(open(os.environ["GITHUB_EVENT_PATH"]))["pull_request"]["head"]["sha"])')"
            range_mode="range"
            log_opts="--no-merges --first-parent ${base_ref}^..${head_ref}"
          fi

          echo "range_mode=${range_mode}" >> "${GITHUB_OUTPUT}"
          {
            echo "log_opts<<EOF"
            echo "${log_opts}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Run gitleaks
        shell: bash
        env:
          GITLEAKS_LOG_OPTS: ${{ steps.gitleaks-range.outputs.log_opts }}
        run: |
          set -euo pipefail
          gitleaks git --no-banner --redact --exit-code 1 --log-opts="${GITLEAKS_LOG_OPTS}" .

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Validate security scan configuration
        run: |
          echo "Repository-level default CodeQL is enabled."
          echo "Advanced CodeQL uploads in CI are skipped to avoid SARIF conflicts."
