name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  PYTHON_VERSION: "3.12"
  BUN_VERSION: "1.3.10"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  backend-tests:
    name: Backend Tests (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run smoke suite (blocking)
        run: |
          pytest tests/test_feature_smoke.py tests/test_routes_health.py -q
        env:
          DEV_MODE: "true"
          OPENAI_API_KEY: "test"

      - name: Enforce critical-route integration coverage >= 85%
        run: |
          pytest \
            tests/test_routes_blog.py \
            tests/test_routes_book.py \
            tests/test_routes_webhooks.py \
            tests/test_routes_payments.py \
            tests/test_routes_usage.py \
            --cov=app.routes.blog \
            --cov=app.routes.book \
            --cov=app.routes.webhooks \
            --cov=app.routes.payments \
            --cov=app.routes.usage \
            --cov-fail-under=85 \
            --cov-report=xml \
            --cov-report=term-missing \
            -q
        env:
          DEV_MODE: "true"
          DEV_API_KEY: "test-key"
          ENVIRONMENT: "development"
          SENTRY_ENVIRONMENT: "development"
          RATE_LIMIT_ENABLED: "false"
          OPENAI_API_KEY: "test"

      - name: Upload coverage report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: always()
        with:
          name: backend-coverage
          path: apps/api/coverage.xml
          retention-days: 14

  backend-regression:
    name: Backend Regression (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run full backend tests
        run: pytest -q
        env:
          DEV_MODE: "true"
          OPENAI_API_KEY: "test"

  frontend-checks:
    name: Frontend Checks (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Unit tests
        run: bun run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: always()
        with:
          name: frontend-coverage
          path: apps/web/coverage/
          retention-days: 14

      - name: Build
        run: bun run build

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-checks]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests with coverage gate
        run: bun run test:e2e:coverage

      - name: Upload E2E coverage report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: always()
        with:
          name: frontend-e2e-coverage
          path: apps/web/coverage/e2e/
          retention-days: 14

      - name: Upload Playwright report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build (main only)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build production image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile.prod
          push: false
          tags: blog-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Validate security scan configuration
        run: |
          echo "Repository-level default CodeQL is enabled."
          echo "Advanced CodeQL uploads in CI are skipped to avoid SARIF conflicts."
